server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy toutes les requetes /api/* vers le superviseur
    # Le prefixe /api est supprime avant le transfert
    location /api/ {
        proxy_pass http://supervisor:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
